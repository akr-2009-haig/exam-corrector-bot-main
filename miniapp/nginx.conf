# Leaderboard mini app (التصنيف) — same pattern as the speech/bot-panel sites.
# Install:
#   sudo cp /home/mtr/bots/new/miniapp/nginx.conf /etc/nginx/sites-available/almosaheh
#   sudo ln -s /etc/nginx/sites-available/almosaheh /etc/nginx/sites-enabled/almosaheh
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d almosaheh.montazar.org
server {
    listen 80;
    server_name almosaheh.montazar.org;

    location / {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}
